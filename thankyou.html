<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Outfit',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:2rem;
            background:url('ba.jpg') center/cover no-repeat;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(255,255,255,.75);
            backdrop-filter:blur(4px);
        }

        .thankyou-box{
            position:relative;
            z-index:1;
            max-width:700px;
            width:100%;
            text-align:center;
            padding:3rem;
            border-radius:25px;
            background:rgba(255,255,255,.65);
            backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,.8);
            box-shadow:0 8px 30px rgba(67,113,158,.15);
        }

        .thankyou-box img{
            width:160px;
            margin-bottom:1.5rem;
        }

        .thankyou-box h1{
            color:#2b3a4a;
            font-size:3rem;
            margin-bottom:1rem;
        }

        .thankyou-box p{
            color:#6b7c8f;
            font-size:1.1rem;
            line-height:1.7;
            margin-bottom:2rem;
        }

        .btn{
            display:inline-block;
            padding:.9rem 2rem;
            background:#43719e;
            color:#fff;
            text-decoration:none;
            border-radius:50px;
            font-weight:600;
            transition:.3s;
        }

        .btn:hover{
            background:#325a81;
            transform:translateY(-3px);
        }
    </style>
</head>

<body>

<div class="thankyou-box">

    <img src="https://cdn-icons-png.flaticon.com/512/561/561188.png" alt="Success">

    <h1>Thank You!</h1>

    <p>
        Your message has been received successfully.
        Thank you for reaching out. I will get back to you as soon as possible.
    </p>

    <a href="index.html" class="btn">Back to Portfolio</a>

</div>

</body>
</html>
