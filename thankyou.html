<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Outfit',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:2rem;
            background:url('ba.jpg') center/cover no-repeat;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            inset:0;
            background:rgba(255,255,255,.75);
            backdrop-filter:blur(4px);
        }

        .thankyou-box{
            max-width:800px;
            width:90%;
            padding:3rem;
            text-align:center;
            background:rgba(255,255,255,.6);
            backdrop-filter:blur(10px);
            border-radius:25px;
            margin:auto;
        }

        .thankyou-image{
            width:700px;
            max-width:100%;
            display:block;
            margin:0 auto 2rem;
        }

        .btn{
            display:inline-block;
            padding:.9rem 2.5rem;
            background:#43719e;
            color:#fff;
            border-radius:40px;
            font-weight:600;
            text-decoration:none;
            transition:.3s;
        }


        .btn:hover{
            background:#325a81;
            transform:translateY(-3px);
        }

    </style>
</head>

<body>
<div class="thankyou-box">

    <img src="thank.png" alt="Thank You" class="thankyou-image">

    <a href="index.html" class="btn">
        Back to Portfolio
    </a>

</div>


</body>
</html>
